<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="rock paper scissor.css">
</head>
<body style="background-color: black;">
    
    <h1 style="color:white;">welcome to the gaming page</h1><hr>
    
    <h1 style="color:rgba(244, 233, 233, 0.961);">rock paper scissor game</h1>
    <p><button onclick="completion('rock');" id="s" class="button"><img src="images/download.jpeg" class="image"></button>
    <button onclick="completion('paper');" id="s" class="button"><img src="images/download (1).jpeg" class="image"></button>
    <button onclick="completion('scissor');"  id="s" class="button"><img src="images/download (2).jpeg" class="image"></button>
    
    </p>
    <p id="r" style="color:white;"></p>
    <button onclick="
      win=0;
      losses=0;
      tie=0;
      document.querySelector('#r').innerHTML=` wins=${win} and losses=${losses} tie=${tie}`;" class="reset">reset</button>
      <button class="reset" onclick="
        autoPlay();
      ">Auto-play</button>
      <p id="y" style="color:white;"> </p>
      <p class="y"></p><hr>

    
    <script src="rock paper scissor.js"></script>
</body>
</html>
